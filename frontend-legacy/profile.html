<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Manage Profiles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .logo {
            position: absolute;
            top: 30px;
            left: 50px;
            font-size: 2.5rem;
            font-weight: 900;
            color: #e50914;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
        }

        .container {
            max-width: 1000px;
            margin: 80px auto 0;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 40px;
            text-align: center;
            font-weight: 400;
        }

        .profiles-list {
            display: grid;
            gap: 20px;
            margin-bottom: 40px;
        }

        .profile-item {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .profile-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .profile-avatar-small {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .profile-info {
            flex: 1;
        }

        .profile-info h3 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .profile-info p {
            color: #808080;
            font-size: 0.9rem;
        }

        .profile-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-edit {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-edit:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-delete {
            background: rgba(229, 9, 20, 0.2);
            color: #ff4444;
            border: 1px solid rgba(229, 9, 20, 0.5);
        }

        .btn-delete:hover {
            background: rgba(229, 9, 20, 0.4);
        }

        .btn-primary {
            background: white;
            color: black;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid #808080;
        }

        .btn-secondary:hover {
            border-color: white;
        }

        .actions-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 30px;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            color: white;
            font-size: 1rem;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .avatar-option {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .avatar-option:hover,
        .avatar-option.selected {
            border-color: white;
            background: rgba(255, 255, 255, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            transform: scale(1.5);
        }
    </style>
</head>

<body>
    <div class="logo">NETFLIX <span style="font-size:0.5em; opacity:0.7">LOCAL</span></div>

    <div class="container">
        <h1>Manage Profiles</h1>

        <div class="profiles-list" id="profiles-list">
            <!-- Profiles will be populated here -->
        </div>

        <div class="actions-bar">
            <button class="btn btn-primary" onclick="openCreateModal()">
                <i class="fas fa-plus"></i> Add Profile
            </button>
            <button class="btn btn-secondary" onclick="window.location.href='login.html'">
                Done
            </button>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div class="modal" id="profile-modal">
        <div class="modal-content">
            <h2 id="modal-title">Add Profile</h2>

            <form onsubmit="saveProfile(event)">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="profile-name" placeholder="Enter name" required maxlength="20">
                </div>

                <div class="form-group">
                    <label>Choose Avatar</label>
                    <div class="avatar-grid" id="avatar-grid">
                        <!-- Avatars populated by JS -->
                    </div>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="is-kid">
                        <label for="is-kid">Kid's Profile</label>
                    </div>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Save</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        let editingProfileId = null;
        let selectedAvatar = '👤';

        function renderProfiles() {
            const list = document.getElementById('profiles-list');
            const profiles = getProfiles();

            list.innerHTML = '';

            profiles.forEach(profile => {
                const item = document.createElement('div');
                item.className = 'profile-item';

                item.innerHTML = `
                    <div class="profile-avatar-small">${profile.avatar}</div>
                    <div class="profile-info">
                        <h3>${profile.name}</h3>
                        <p>${profile.isKid ? 'Kid\'s Profile' : 'Regular Profile'}</p>
                    </div>
                    <div class="profile-actions">
                        <button class="btn btn-edit" onclick="openEditModal('${profile.id}')">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn btn-delete" onclick="confirmDelete('${profile.id}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                `;

                list.appendChild(item);
            });
        }

        function renderAvatars() {
            const grid = document.getElementById('avatar-grid');
            grid.innerHTML = '';

            AVATARS.forEach(avatar => {
                const option = document.createElement('div');
                option.className = 'avatar-option';
                option.textContent = avatar;
                option.onclick = () => selectAvatar(avatar);
                if (avatar === selectedAvatar) {
                    option.classList.add('selected');
                }
                grid.appendChild(option);
            });
        }

        function selectAvatar(avatar) {
            selectedAvatar = avatar;
            renderAvatars();
        }

        function openCreateModal() {
            editingProfileId = null;
            document.getElementById('modal-title').textContent = 'Add Profile';
            document.getElementById('profile-name').value = '';
            document.getElementById('is-kid').checked = false;
            selectedAvatar = '👤';
            renderAvatars();
            document.getElementById('profile-modal').style.display = 'flex';
        }

        function openEditModal(profileId) {
            const profiles = getProfiles();
            const profile = profiles.find(p => p.id === profileId);

            if (profile) {
                editingProfileId = profileId;
                document.getElementById('modal-title').textContent = 'Edit Profile';
                document.getElementById('profile-name').value = profile.name;
                document.getElementById('is-kid').checked = profile.isKid;
                selectedAvatar = profile.avatar;
                renderAvatars();
                document.getElementById('profile-modal').style.display = 'flex';
            }
        }

        function closeModal() {
            document.getElementById('profile-modal').style.display = 'none';
        }

        function saveProfile(event) {
            event.preventDefault();

            const name = document.getElementById('profile-name').value;
            const isKid = document.getElementById('is-kid').checked;

            if (editingProfileId) {
                updateProfile(editingProfileId, { name, avatar: selectedAvatar, isKid });
            } else {
                createProfile(name, selectedAvatar, isKid);
            }

            closeModal();
            renderProfiles();
        }

        function confirmDelete(profileId) {
            const profiles = getProfiles();
            const profile = profiles.find(p => p.id === profileId);

            if (confirm(`Delete profile "${profile.name}"?`)) {
                deleteProfile(profileId);
                renderProfiles();
            }
        }

        // Initialize
        renderProfiles();
    </script>
</body>

</html>
