<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Local</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="auth.js"></script>
</head>

<body>
    <div id="dynamic-bg"></div>

    <div class="navbar" id="navbar">
        <div class="logo" onclick="window.scrollTo({top:0, behavior:'smooth'})">NETFLIX <span
                style="font-size:0.5em; opacity:0.7">LOCAL</span></div>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Titles, people, genres">
        </div>
        <div class="nav-links">
            <button onclick="filterMedia('all')">Home</button>
            <button onclick="filterMedia('movie')">Movies</button>
            <button onclick="filterMedia('tv')">TV Shows</button>
            <div class="profile-dropdown">
                <div class="profile-icon" id="profile-icon" onclick="toggleProfileMenu()">
                    <span id="profile-avatar">👤</span>
                    <i class="fas fa-caret-down"></i>
                </div>
                <div class="profile-menu" id="profile-menu">
                    <div class="profile-menu-item" onclick="window.location.href='profile.html'">
                        <i class="fas fa-user-edit"></i> Manage Profiles
                    </div>
                    <div class="profile-menu-item" onclick="window.location.href='login.html'">
                        <i class="fas fa-users"></i> Switch Profile
                    </div>
                    <div class="profile-menu-divider"></div>
                    <div class="profile-menu-item" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="hero" id="hero">
        <div class="hero-content">
            <h1 class="hero-title" id="hero-title">Loading Library...</h1>
            <div class="hero-meta" id="hero-meta">
                <!-- Year | Rating | Duration -->
            </div>
            <p class="hero-desc" id="hero-desc">Connecting to TMDB...</p>
            <div class="hero-actions">
                <button class="btn btn-play" id="hero-play"><i class="fas fa-play"></i> Play</button>
                <button class="btn btn-more" id="hero-info"><i class="fas fa-info-circle"></i> More Info</button>
            </div>
        </div>
    </div>

    <div id="rows-container">
        <!-- Search Results Row (Hidden by default) -->
        <div class="row" id="search-row" style="display:none;">
            <h2 class="row-title">Search Results</h2>
            <div class="row-posters" id="search-list"></div>
        </div>

        <div class="row" id="continue-watching-row" style="display:none;">
            <h2 class="row-title">Continue Watching</h2>
            <div class="row-posters" id="continue-watching-list"></div>
        </div>

        <div class="row" id="trending-row">
            <h2 class="row-title">Trending Now</h2>
            <div class="row-posters" id="trending-list"></div>
        </div>

        <div class="row" id="popular-movies-row">
            <h2 class="row-title">Popular Movies</h2>
            <div class="row-posters" id="popular-movies-list"></div>
        </div>

        <div class="row" id="top-tv-row">
            <h2 class="row-title">Top Rated TV Shows</h2>
            <div class="row-posters" id="top-tv-list"></div>
        </div>

        <div class="row" id="library-row">
            <h2 class="row-title">Your Library</h2>
            <div class="row-posters" id="movies-list"></div>
        </div>

        <div class="row">
            <h2 class="row-title">TV Series</h2>
            <div class="row-posters" id="tv-list"></div>
        </div>
    </div>

    <!-- Custom Player Overlay -->
    <div id="player-overlay">
        <div class="player-header">
            <div class="back-btn" onclick="closePlayer()"><i class="fas fa-arrow-left"></i> Back</div>

            <div class="controls-right" style="display:flex; gap:15px; align-items:center;">
                <!-- TV Show Selectors (Hidden for Movies) -->
                <div id="tv-controls" style="display:none; gap:10px;">
                    <select id="season-select" class="glass-select" onchange="updateEpisodeList()"></select>
                    <select id="episode-select" class="glass-select" onchange="switchEpisode()"></select>
                </div>

                <div class="source-selector">
                    <label for="provider-select">Source: </label>
                    <select id="provider-select" onchange="switchProvider(this.value)">
                        <!-- Options populated by JS -->
                    </select>
                </div>

                <div class="fullscreen-btn" onclick="toggleFullscreen()">
                    <i class="fas fa-expand"></i>
                </div>
            </div>
        </div>

        <video id="video-player" controls style="display:none;"></video>
        <!-- iframe will be appended here by JS -->
    </div>

    <script src="script.js"></script>
</body>

</html>
