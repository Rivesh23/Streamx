<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Who's Watching?</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo {
            position: absolute;
            top: 30px;
            left: 50px;
            font-size: 2.5rem;
            font-weight: 900;
            color: #e50914;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
        }

        .container {
            text-align: center;
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 50px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .profiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .profile-card {
            cursor: pointer;
            transition: transform 0.3s ease;
            text-align: center;
        }

        .profile-card:hover {
            transform: scale(1.1);
        }

        .profile-avatar {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border: 3px solid transparent;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            margin-bottom: 15px;
            transition: border-color 0.3s;
            backdrop-filter: blur(10px);
        }

        .profile-card:hover .profile-avatar {
            border-color: white;
        }

        .profile-name {
            font-size: 1.3rem;
            color: #808080;
            transition: color 0.3s;
        }

        .profile-card:hover .profile-name {
            color: white;
        }

        .add-profile {
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.3);
        }

        .add-profile:hover {
            border-color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .add-icon {
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .manage-btn {
            margin-top: 30px;
            padding: 12px 40px;
            background: transparent;
            border: 2px solid #808080;
            color: #808080;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .manage-btn:hover {
            border-color: white;
            color: white;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            animation: fadeIn 0.6s ease;
        }
    </style>
</head>

<body>
    <div class="logo">NETFLIX <span style="font-size:0.5em; opacity:0.7">LOCAL</span></div>

    <div class="container">
        <h1>Who's watching?</h1>

        <div class="profiles-grid" id="profiles-grid">
            <!-- Profiles will be populated here -->
        </div>

        <button class="manage-btn" onclick="window.location.href='profile.html'">Manage Profiles</button>
    </div>

    <script src="auth.js"></script>
    <script>
        // Check if already logged in
        if (getActiveProfile()) {
            window.location.href = 'index.html';
        }

        function renderProfiles() {
            const grid = document.getElementById('profiles-grid');
            const profiles = getProfiles();

            grid.innerHTML = '';

            // Render existing profiles
            profiles.forEach(profile => {
                const card = document.createElement('div');
                card.className = 'profile-card';
                card.onclick = () => selectProfile(profile.id);

                card.innerHTML = `
                    <div class="profile-avatar">
                        ${profile.avatar}
                    </div>
                    <div class="profile-name">${profile.name}</div>
                `;

                grid.appendChild(card);
            });

            // Add "Add Profile" card if less than 5 profiles
            if (profiles.length < 5) {
                const addCard = document.createElement('div');
                addCard.className = 'profile-card';
                addCard.onclick = () => window.location.href = 'profile.html?action=create';

                addCard.innerHTML = `
                    <div class="profile-avatar add-profile">
                        <i class="fas fa-plus add-icon"></i>
                    </div>
                    <div class="profile-name">Add Profile</div>
                `;

                grid.appendChild(addCard);
            }
        }

        function selectProfile(profileId) {
            setActiveProfile(profileId);
            window.location.href = 'index.html';
        }

        // Initialize
        renderProfiles();

        // Create default profile if none exist
        if (getProfiles().length === 0) {
            createProfile('User', '👤', false);
            renderProfiles();
        }
    </script>
</body>

</html>
