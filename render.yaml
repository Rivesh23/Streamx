services:
  - type: web
    name: streamx
    env: python
    plan: free
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app"
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: TMDB_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
